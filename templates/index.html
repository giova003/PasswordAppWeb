<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Password App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Password App 🔒</h1>
        
        <form method="POST" action="/encode">
            <input type="text" name="name" placeholder="Inserisci il tuo nome" required>
            <button type="submit">Codifica</button>
        </form>

        <form method="POST" action="/decode">
            <input type="text" name="password" placeholder="Inserisci la password" required>
            <button type="submit">Decodifica</button>
        </form>

        {% if result %}
            <div class="result">{{ result }}</div>
        {% endif %}
    </div>
</body>
</html>
